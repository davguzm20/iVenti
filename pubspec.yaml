name: iventi
description: "Sistema de Gestión de Inventario y Ventas"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.2.1
  postgres: ^3.4.0
  go_router: ^14.7.2
  provider: ^6.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^5.0.0
  test: any
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets: 
    - "lib/.env"
    - "lib/assets/imagenes/"
    - "lib/assets/iconos/"
