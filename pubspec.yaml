publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter
  mockito: ^5.4.2
  build_runner: ^2.4.6
  path: ^1.9.0
  sqflite: ^2.3.0
  sqflite_common_ffi: any  # Considera especificar una versión
  awesome_dialog: ^3.2.1
  pinput: ^5.0.1
